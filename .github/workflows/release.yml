name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      # Enforce the same gates as CI before touching packaging
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - run: cargo build --release

      - name: Install packaging tools
        run: |
          cargo install --locked cargo-deb
          cargo install --locked cargo-generate-rpm

      - name: Build DEB
        run: cargo deb

      - name: Build RPM
        run: |
          cargo generate-rpm

      - name: Build AppImage
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          mkdir -p AppDir/usr/{bin,share/applications,share/icons/hicolor/scalable/apps}
          cp target/release/xone-tray AppDir/usr/bin/
          cp packaging/xone-tray.desktop AppDir/usr/share/applications/
          cp packaging/io.github.savagecore.XoneTray.svg \
             AppDir/usr/share/icons/hicolor/scalable/apps/xone-tray.svg

          # OUTPUT overrides the name linuxdeploy derives from the desktop file's Name= field
          OUTPUT=xone-tray-${VERSION}-x86_64.AppImage \
          ARCH=x86_64 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/xone-tray.desktop \
            --output appimage

      - name: Build release tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist/xone-tray-${VERSION}
          cp target/release/xone-tray                         dist/xone-tray-${VERSION}/
          cp packaging/50-xone-tray.rules                     dist/xone-tray-${VERSION}/
          cp packaging/xone-tray.desktop                      dist/xone-tray-${VERSION}/
          cp packaging/io.github.savagecore.XoneTray.svg      dist/xone-tray-${VERSION}/
          cp LICENSE                                           dist/xone-tray-${VERSION}/
          tar -czf xone-tray-${VERSION}-x86_64.tar.gz -C dist xone-tray-${VERSION}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            xone-tray-*-x86_64.AppImage
            xone-tray-*-x86_64.tar.gz
            packaging/50-xone-tray.rules

  pacman-repo:
    name: Publish Pacman Repo
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Arch package & repo database
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release download ${GITHUB_REF_NAME} \
            --pattern "xone-tray-${VERSION}-x86_64.tar.gz" \
            --dir /tmp/pkg-dl
          SHA256=$(sha256sum /tmp/pkg-dl/xone-tray-${VERSION}-x86_64.tar.gz | cut -d' ' -f1)

          mkdir -p /tmp/pkg-build /tmp/pacman-repo
          sed "s/^pkgver=.*/pkgver=${VERSION}/" packaging/pacman/PKGBUILD \
            | sed "s/sha256sums=.*/sha256sums=('${SHA256}')/" \
            > /tmp/pkg-build/PKGBUILD

          docker run --rm \
            -v /tmp/pkg-build:/pkg \
            -v /tmp/pacman-repo:/repo \
            archlinux:base-devel \
            bash -c "
              useradd -m builder
              chown builder:builder /pkg
              cd /pkg && su builder -c 'makepkg --noconfirm'
              cp /pkg/*.pkg.tar.zst /repo/
              repo-add /repo/xone-tray.db.tar.zst /repo/*.pkg.tar.zst
            "
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: /tmp/pacman-repo
          target-folder: pacman
          clean: true

  flatpak-repo:
    name: Publish Flatpak Repo
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache Flatpak runtimes
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-freedesktop-24.08

      - name: Install Flatpak tools & runtime
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Build Flatpak & export repo
        run: |
          flatpak-builder --repo=flatpak-repo --force-clean --user builddir \
            packaging/flatpak/io.github.savagecore.XoneTray.yml

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: flatpak-repo
          target-folder: flatpak
          clean: true
